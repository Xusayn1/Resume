{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Huseyin | Portfolio & Resume{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="dot"></span>
      <a href="{% url 'home' %}">Huseyin</a>
    </div>
    <nav class="nav">
      <a href="{% url 'home' %}">Home</a>
      <a href="{% url 'about' %}">About</a>
      <a href="{% url 'projects' %}">Projects</a>
      <a href="{% url 'resume' %}">Resume</a>
      <a href="{% url 'contact' %}">Contact</a>
    </nav>
    <a class="nav-cta" href="{% static 'files/Huseyin_CV.pdf' %}" download>Download CV</a>
  </header>

  <main class="page">
    {% block content %}
    {% endblock %}
  </main>

  <footer class="footer">
    <p>&copy; {% now "Y" %} Huseyin &bull; Crafted with Django</p>
  </footer>
</body>
</html>
